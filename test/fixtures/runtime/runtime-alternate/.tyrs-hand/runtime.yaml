version: 1

runtimes:
  python: "3.14.6"
  node: "22.23.1"
  pnpm: "11.14.0"
  go: "1.25.12"
  rust:
    version: "1.96.0"
    profile: "minimal"
    components: ["rustfmt", "clippy"]
    targets: []

projects:
  - name: python
    path: "python"
    dependencies: [{manager: requirements}]
  - name: node
    path: "node"
    dependencies: [{manager: pnpm}]
  - name: go
    path: "go"
    dependencies: [{manager: go}]
  - name: rust
    path: "rust"
    dependencies: [{manager: cargo}]
