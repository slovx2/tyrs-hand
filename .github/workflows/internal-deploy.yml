name: Internal deployment images

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: internal-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target: [control, worker]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - id: image
        name: Resolve internal deployment image
        shell: bash
        env:
          IMAGE_TARGET: ${{ matrix.target }}
        run: |
          version="deploy-${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}"
          image="ghcr.io/${GITHUB_REPOSITORY,,}-${IMAGE_TARGET}"
          {
            echo "repository=${image}"
            echo "tag=${image}:${version}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"
          echo "### ${IMAGE_TARGET}: ${version}" >> "${GITHUB_STEP_SUMMARY}"
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tag }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=internal-${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=internal-${{ matrix.target }}
      - name: Record immutable digest
        env:
          IMAGE: ${{ steps.image.outputs.repository }}
          VERSION: ${{ steps.image.outputs.version }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: echo "${IMAGE}:${VERSION} → ${IMAGE}@${DIGEST}" >> "${GITHUB_STEP_SUMMARY}"
