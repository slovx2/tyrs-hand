name: CI

on:
  pull_request:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      include_tauri:
        description: Run the real Tauri cold-cache and offline debug builds
        required: true
        type: boolean
        default: true
      include_alternate:
        description: Run the alternate toolchain cold-cache and offline matrix
        required: true
        type: boolean
        default: true
      build_arm64:
        description: Build the linux/arm64 Worker image after the runtime matrix
        required: true
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: 1.26.5
  NODE_VERSION: 24.14.0
  PNPM_VERSION: 11.14.0

jobs:
  verify:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: postgres:18.3-bookworm@sha256:80630f83606d8db77d30b3851b16a9f78be2d0d4dda6f7b82a1fdca5ebe3acba
        env:
          POSTGRES_DB: tyrs_hand_test
          POSTGRES_USER: tyrs_hand
          POSTGRES_PASSWORD: test-password
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U tyrs_hand -d tyrs_hand_test"
          --health-interval 5s --health-timeout 3s --health-retries 20
      redis:
        image: redis:8.4.0-bookworm@sha256:c22af04bb576503bf16b3e34a1fd2fd82de0f765afd866d2e380145e0af30d78
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 20
    env:
      TEST_DATABASE_URL: postgres://tyrs_hand:test-password@localhost:5432/tyrs_hand_test?sslmode=disable
      TEST_REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with: { go-version: "1.26.5", cache: true }
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with: { node-version: "24.14.0" }
      - run: npm install --global pnpm@11.14.0
      - run: npm install --global @openai/codex@0.145.0
      - run: go mod download && go mod verify
      - run: pnpm --dir web install --frozen-lockfile
      - name: Validate release version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: '[[ "${RELEASE_TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]'
      - name: Generated code, lint, tests and build
        run: make ci
      - uses: codecov/codecov-action@af09b5e394c93991b95a5e7646aeb90c1917f78f # v5.5.1
        with:
          files: coverage/go.out,web/coverage/lcov.info
          fail_ci_if_error: false
      - name: Browser end-to-end
        env:
          TYRS_HAND_DATABASE_URL: postgres://tyrs_hand:test-password@localhost:5432/tyrs_hand_test?sslmode=disable
          TYRS_HAND_REDIS_URL: redis://localhost:6379/1
          TYRS_HAND_SETUP_TOKEN: integration-setup-token
          TYRS_HAND_COOKIE_SECURE: "false"
          E2E_SETUP_TOKEN: integration-setup-token
        run: |
          TYRS_HAND_MASTER_KEY="$(openssl rand -base64 32)"
          export TYRS_HAND_MASTER_KEY
          go run ./cmd/tyrs-hand-admin migrate
          go run ./cmd/tyrs-hand-server >/tmp/tyrs-hand-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill ${SERVER_PID}; cat /tmp/tyrs-hand-server.log' EXIT
          for _ in $(seq 1 30); do curl --fail --silent http://127.0.0.1:8080/healthz && break; sleep 1; done
          pnpm --dir web exec playwright install --with-deps chromium
          pnpm --dir web e2e

  runtime-images:
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-24.04
    needs: verify
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: control
          load: true
          tags: tyrs-hand-control:test
          cache-from: type=gha,scope=control
          cache-to: type=gha,mode=max,scope=control
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: worker
          load: true
          tags: tyrs-hand-worker:test
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: development
          load: true
          tags: tyrs-hand-development:test
          cache-from: type=gha,scope=development
          cache-to: type=gha,mode=max,scope=development
      - name: Worker runtime smoke test
        run: ./tools/test-worker-runtime.sh tyrs-hand-worker:test
      - name: Development runtime smoke test
        run: ./tools/test-development-runtime.sh tyrs-hand-development:test

  runtime-matrix:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: worker
          load: true
          tags: tyrs-hand-worker:matrix
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
      - name: Default, alternate, offline and Tauri runtime matrix
        env:
          TYRS_HAND_TEST_TAURI: ${{ inputs.include_tauri && '1' || '0' }}
          TYRS_HAND_TEST_ALTERNATE: ${{ inputs.include_alternate && '1' || '0' }}
        run: ./tools/test-worker-runtime.sh tyrs-hand-worker:matrix
      - name: Build linux/arm64 Worker image
        if: inputs.build_arm64
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: worker
          platforms: linux/arm64
          push: false
          cache-from: type=gha,scope=worker-arm64
          cache-to: type=gha,mode=max,scope=worker-arm64

  image-candidate:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-24.04
    needs: verify
    strategy:
      matrix:
        target: [control, worker, development]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - id: image
        name: Resolve candidate image tag
        shell: bash
        env:
          IMAGE_TARGET: ${{ matrix.target }}
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}-${IMAGE_TARGET}"
          {
            echo "repository=${image}"
            echo "tag=${image}:sha-${GITHUB_SHA}"
          } >> "${GITHUB_OUTPUT}"
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.tag }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          image-ref: ${{ steps.image.outputs.repository }}@${{ steps.build.outputs.digest }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Sign multi-architecture manifest
        env:
          IMAGE: ${{ steps.image.outputs.repository }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  image-release:
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-24.04
    needs: image-candidate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
      - uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish matching Control, Worker and Development release tags
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          for target in control worker development; do
            image="ghcr.io/${GITHUB_REPOSITORY,,}-${target}"
            docker buildx imagetools create \
              --tag "${image}:${RELEASE_TAG}" \
              "${image}:sha-${GITHUB_SHA}"
          done
