openapi: 3.1.0
info:
  title: tyrs-hand Management API
  version: 0.1.0
  license:
    name: MIT
    identifier: MIT
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: GitHub
  - name: Resources
  - name: Settings
  - name: Discord
paths:
  /webhooks/github:
    post:
      operationId: receiveGitHubWebhook
      tags: [GitHub]
      servers: [{ url: / }]
      security: []
      parameters:
        - { name: X-Hub-Signature-256, in: header, required: true, schema: { type: string } }
        - { name: X-GitHub-Delivery, in: header, required: true, schema: { type: string } }
        - { name: X-GitHub-Event, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "202":
          description: 已持久化
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        default: { $ref: "#/components/responses/Problem" }
  /internal/v1/tools/call:
    post:
      operationId: callInternalTool
      tags: [Resources]
      servers: [{ url: / }]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Tool Call 结果
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        default: { $ref: "#/components/responses/Problem" }
  /setup/status:
    get:
      operationId: getSetupStatus
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Setup 状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }
  /setup/admin:
    post:
      operationId: setupAdministrator
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupRequest" }
      responses:
        "201":
          description: 管理员与恢复资料
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupResult" }
        default: { $ref: "#/components/responses/Problem" }
  /auth/login:
    post:
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: 登录会话
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResult" }
        default: { $ref: "#/components/responses/Problem" }
  /auth/me:
    get:
      operationId: getCurrentAdministrator
      tags: [Auth]
      responses:
        "200":
          description: 当前管理员
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Administrator" }
        default: { $ref: "#/components/responses/Problem" }
  /auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: 已退出 }
        default: { $ref: "#/components/responses/Problem" }
  /github/app:
    get:
      operationId: getGitHubApp
      tags: [GitHub]
      responses:
        "200":
          description: GitHub App 状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GitHubAppStatus" }
    put:
      operationId: putGitHubApp
      tags: [GitHub]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GitHubAppInput" }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /github/app/manifest:
    get:
      operationId: getGitHubAppManifest
      tags: [GitHub]
      responses:
        "200":
          description: Manifest 表单参数
          content:
            application/json:
              schema:
                type: object
                required: [url, manifest]
                properties:
                  url: { type: string, format: uri }
                  manifest: { type: string }
  /github/app/manifest/callback:
    get:
      operationId: githubAppManifestCallback
      tags: [GitHub]
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
      responses:
        "302": { description: 返回 GitHub 设置页 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/agent-provider:
    get:
      operationId: getAgentProviderSettings
      tags: [Settings]
      responses:
        "200":
          description: Agent Provider 设置
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentProviderSettings" }
    put:
      operationId: putAgentProviderSettings
      tags: [Settings]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentProviderSettingsInput" }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/codex:
    get:
      operationId: listCodexSettings
      tags: [Settings]
      responses:
        "200":
          description: 仓库与 Discord Forum 的 Codex 设置
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CodexSettingsList" }
        default: { $ref: "#/components/responses/Problem" }
  /settings/codex/repositories/{id}:
    put:
      operationId: putRepositoryCodexSettings
      tags: [Settings]
      parameters:
        - { $ref: "#/components/parameters/CSRFToken" }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CodexPreferences" } } }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/codex/forums/{id}:
    put:
      operationId: putForumCodexSettings
      tags: [Settings]
      parameters:
        - { $ref: "#/components/parameters/CSRFToken" }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CodexPreferences" } } }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/discord:
    get:
      operationId: getDiscordSettings
      tags: [Discord]
      responses:
        "200":
          description: Discord 设置
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordSettings" } } }
        default: { $ref: "#/components/responses/Problem" }
    put:
      operationId: putDiscordSettings
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DiscordSettingsInput" } } }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/status:
    get:
      operationId: getDiscordStatus
      tags: [Discord]
      responses:
        "200":
          description: Discord 运行状态
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordStatus" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/initializations/preflight:
    post:
      operationId: preflightDiscordInitialization
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DiscordInitializationInput" } } }
      responses:
        "200":
          description: 零修改预检结果
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordPreflight" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/initializations:
    post:
      operationId: createDiscordInitialization
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DiscordInitializationInput" } } }
      responses:
        "202":
          description: 初始化已排队
          content: { application/json: { schema: { $ref: "#/components/schemas/IDResource" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/initializations/{id}:
    get:
      operationId: getDiscordInitialization
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 初始化状态
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordInitialization" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/members:
    get:
      operationId: listDiscordMembers
      tags: [Discord]
      responses:
        "200":
          description: Discord 成员
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DiscordMember" } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-environments:
    get:
      operationId: listDiscordDevelopmentEnvironments
      tags: [Discord]
      responses:
        "200":
          description: 长期开发环境
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DiscordDevelopmentEnvironment" } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-environments/{id}/rebuild:
    post:
      operationId: rebuildDiscordDevelopmentEnvironment
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      responses:
        "202": { description: 已标记为下次运行前重建 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-forums/{id}/delete-preflight:
    get:
      operationId: preflightDiscordDevelopmentForumDeletion
      tags: [Discord]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200":
          description: 删除预检
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordDevelopmentDeletePreflight" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-forums/{id}/delete:
    post:
      operationId: deleteDiscordDevelopmentForum
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties: { confirmation: { type: string } }
      responses:
        "202":
          description: 删除已排队
          content: { application/json: { schema: { $ref: "#/components/schemas/IDResource" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/members/{id}/forum:
    post:
      operationId: createDiscordMemberForum
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repositoryId]
              properties:
                repositoryId: { type: string, format: uuid }
                name: { type: string }
      responses:
        "202":
          description: Forum 创建已排队
          content: { application/json: { schema: { $ref: "#/components/schemas/IDResource" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/forums/{forumId}/access/{memberId}:
    parameters:
      - { name: forumId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: memberId, in: path, required: true, schema: { type: string } }
    put:
      operationId: putDiscordForumAccess
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accessLevel]
              properties: { accessLevel: { type: string, enum: [readonly, operator] } }
      responses:
        "204": { description: 已更新 }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      operationId: deleteDiscordForumAccess
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: 已删除 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/github/bind:
    post:
      operationId: startDiscordGitHubBind
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guildId, discordUserId]
              properties: { guildId: { type: string }, discordUserId: { type: string } }
      responses:
        "200":
          description: 一次性绑定链接
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties: { url: { type: string, format: uri } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/github/bind/callback:
    get:
      operationId: completeDiscordGitHubBind
      tags: [Discord]
      security: []
      parameters:
        - { name: state, in: query, required: true, schema: { type: string } }
        - { name: code, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: 绑定完成 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/github/unbind:
    post:
      operationId: unbindDiscordGitHub
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guildId, discordUserId, confirmed]
              properties:
                guildId: { type: string }
                discordUserId: { type: string }
                confirmed: { type: boolean }
      responses:
        "204": { description: 已解绑 }
        default: { $ref: "#/components/responses/Problem" }
  /events/stream:
    get:
      operationId: streamEvents
      tags: [Resources]
      responses:
        "200":
          description: Server-Sent Events
          content:
            text/event-stream:
              schema: { type: string }
  /repositories:
    get: { $ref: "#/components/pathItems/ListRepositories" }
    post:
      operationId: createRepository
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RepositoryInput" }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDResource" }
        default: { $ref: "#/components/responses/Problem" }
  /agent-profiles:
    get: { $ref: "#/components/pathItems/ListAgentProfiles" }
    post: { $ref: "#/components/pathItems/CreateGeneric" }
  /trigger-rules:
    get: { $ref: "#/components/pathItems/ListTriggerRules" }
    post:
      operationId: createTriggerRule
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TriggerRuleInput" }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDResource" }
        default: { $ref: "#/components/responses/Problem" }
  /work-items:
    get: { $ref: "#/components/pathItems/ListWorkItems" }
  /threads:
    get: { $ref: "#/components/pathItems/ListThreads" }
  /jobs:
    get: { $ref: "#/components/pathItems/ListJobs" }
  /workers:
    get: { $ref: "#/components/pathItems/ListWorkers" }
  /worktrees:
    get: { $ref: "#/components/pathItems/ListWorktrees" }
  /audit-logs:
    get: { $ref: "#/components/pathItems/ListAuditLogs" }
  /installations:
    get: { $ref: "#/components/pathItems/ListInstallations" }
  /repo-caches:
    get: { $ref: "#/components/pathItems/ListRepoCaches" }
  /system/status:
    get:
      operationId: getSystemStatus
      tags: [Resources]
      responses:
        "200":
          description: 系统状态
          content:
            application/json:
              schema: { type: object, additionalProperties: { type: integer, format: int64 } }
        default: { $ref: "#/components/responses/Problem" }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: tyrs_hand_session
  parameters:
    CSRFToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
  responses:
    Problem:
      description: RFC 9457 Problem Details
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    ResourceList:
      description: 游标分页资源列表
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ResourceList" }
  pathItems:
    ListRepositories:
      operationId: listRepositories
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListAgentProfiles:
      operationId: listAgentProfiles
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListTriggerRules:
      operationId: listTriggerRules
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListWorkItems:
      operationId: listWorkItems
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListThreads:
      operationId: listThreads
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListJobs:
      operationId: listJobs
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListWorkers:
      operationId: listWorkers
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListWorktrees:
      operationId: listWorktrees
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListAuditLogs:
      operationId: listAuditLogs
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListInstallations:
      operationId: listInstallations
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListRepoCaches:
      operationId: listRepoCaches
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    CreateGeneric:
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDResource" }
        default: { $ref: "#/components/responses/Problem" }
  schemas:
    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type: { type: string, format: uri-reference }
        title: { type: string }
        status: { type: integer, minimum: 400, maximum: 599 }
        detail: { type: string }
        instance: { type: string, format: uri-reference }
        requestId: { type: string }
    SetupStatus:
      type: object
      required: [setupRequired, githubConfigured]
      properties:
        setupRequired: { type: boolean }
        githubConfigured: { type: boolean }
    SetupRequest:
      type: object
      required: [setupToken, username, password]
      properties:
        setupToken: { type: string, minLength: 16 }
        username: { type: string, minLength: 3, maxLength: 64 }
        password: { type: string, minLength: 12, maxLength: 256 }
    SetupResult:
      type: object
      required: [totpSecret, provisioningUri, recoveryCodes]
      properties:
        totpSecret: { type: string }
        provisioningUri: { type: string, format: uri }
        recoveryCodes: { type: array, items: { type: string } }
    LoginRequest:
      type: object
      required: [username, password, totp]
      properties:
        username: { type: string }
        password: { type: string }
        totp: { type: string, pattern: "^[0-9]{6}$" }
    LoginResult:
      type: object
      required: [username, csrfToken, expiresAt]
      properties:
        username: { type: string }
        csrfToken: { type: string }
        expiresAt: { type: string, format: date-time }
    Administrator:
      type: object
      required: [id, username, csrfToken, expiresAt]
      properties:
        id: { type: string, format: uuid }
        username: { type: string }
        csrfToken: { type: string }
        expiresAt: { type: string, format: date-time }
    GitHubAppStatus:
      type: object
      required: [configured]
      properties:
        configured: { type: boolean }
        appId: { type: integer, format: int64 }
        clientId: { type: string }
        appSlug: { type: string }
    GitHubAppInput:
      type: object
      required: [appId, appSlug, privateKey, webhookSecret]
      properties:
        appId: { type: integer, format: int64, minimum: 1 }
        clientId: { type: string }
        appSlug: { type: string }
        privateKey: { type: string, writeOnly: true }
        webhookSecret: { type: string, writeOnly: true }
        clientSecret: { type: string, writeOnly: true }
    RepositoryInput:
      type: object
      required: [installationExternalId, accountLogin, repositoryExternalId, owner, name, defaultBranch, cloneUrl]
      properties:
        installationExternalId: { type: integer, format: int64 }
        accountLogin: { type: string }
        accountType: { type: string, default: Organization }
        repositoryExternalId: { type: integer, format: int64 }
        owner: { type: string }
        name: { type: string }
        defaultBranch: { type: string }
        cloneUrl: { type: string, format: uri }
    TriggerRuleInput:
      type: object
      required: [repositoryId, agentProfileId, name, eventName, triggerKind, instruction]
      properties:
        repositoryId: { type: string, format: uuid }
        agentProfileId: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 128 }
        eventName: { type: string, minLength: 1 }
        action: { type: string }
        enabled: { type: boolean }
        priority: { type: integer, default: 100 }
        triggerKind:
          type: string
          enum: [event, label, slash_command, mention_command, legacy_mention]
        triggerValue:
          type: string
          description: Label 名或不带斜杠的命令名；event、mention_command 与 legacy_mention 留空。
        actorMinPermission:
          type: string
          enum: [read, triage, write, maintain, admin]
          default: triage
        instruction: { type: string, minLength: 1 }
        skills: { type: array, items: { type: string } }
        allowedTools: { type: array, items: { type: string } }
        dangerousActions: { type: array, items: { type: string } }
        filters: { type: object, additionalProperties: true }
    AgentProviderSettings:
      type: object
      required: [providerType, configured]
      properties:
        providerType: { type: string, enum: [device-code, api-key] }
        baseUrl: { type: string, format: uri }
        model: { type: string }
        reasoningEffort: { type: string }
        serviceTier: { type: string }
        proxyUrl: { type: string, format: uri }
        configured: { type: boolean }
        configSignature: { type: string, readOnly: true }
    AgentProviderSettingsInput:
      allOf:
        - $ref: "#/components/schemas/AgentProviderSettings"
        - type: object
          properties:
            apiKey: { type: string, writeOnly: true }
    CodexPreferences:
      type: object
      properties:
        model: { type: string, nullable: true, maxLength: 128 }
        reasoningEffort: { type: string, nullable: true, enum: [low, medium, high, xhigh] }
        serviceTier: { type: string, nullable: true, enum: [standard, fast] }
    CodexEffectivePreferences:
      type: object
      required: [model, reasoningEffort, serviceTier]
      properties:
        model: { type: string }
        reasoningEffort: { type: string }
        serviceTier: { type: string, enum: [standard, fast] }
    CodexForumSettings:
      type: object
      required: [id, name, ownerDiscordUserId, settings, effective]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        ownerDiscordUserId: { type: string }
        settings: { $ref: "#/components/schemas/CodexPreferences" }
        effective: { $ref: "#/components/schemas/CodexEffectivePreferences" }
    CodexRepositorySettings:
      type: object
      required: [id, owner, name, settings, effective, forums]
      properties:
        id: { type: string, format: uuid }
        owner: { type: string }
        name: { type: string }
        settings: { $ref: "#/components/schemas/CodexPreferences" }
        effective: { $ref: "#/components/schemas/CodexEffectivePreferences" }
        forums: { type: array, items: { $ref: "#/components/schemas/CodexForumSettings" } }
    CodexSettingsList:
      type: object
      required: [items, modelOptions]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/CodexRepositorySettings" } }
        modelOptions: { type: array, items: { type: string } }
    DiscordSettings:
      type: object
      required: [guildId, enabled, communityEnabled, tokenConfigured]
      properties:
        guildId: { type: string }
        enabled: { type: boolean }
        communityEnabled: { type: boolean }
        applicationId: { type: string }
        botUserId: { type: string }
        tokenConfigured: { type: boolean }
    DiscordSettingsInput:
      type: object
      required: [guildId, enabled]
      properties:
        guildId: { type: string, pattern: "^[0-9]+$" }
        enabled: { type: boolean }
        botToken: { type: string, writeOnly: true }
        applicationId: { type: string, pattern: "^[0-9]*$" }
        botUserId: { type: string, pattern: "^[0-9]*$" }
    DiscordStatus:
      type: object
      required: [configured, enabled, gatewayStatus, pendingOutbox, failedOutbox, pendingInitializationOperations]
      properties:
        configured: { type: boolean }
        enabled: { type: boolean }
        gatewayStatus: { type: string }
        gatewayError: { type: string }
        lastGatewayAt: { type: string, format: date-time }
        pendingOutbox: { type: integer, format: int64 }
        failedOutbox: { type: integer, format: int64 }
        pendingInitializationOperations: { type: integer, format: int64 }
    DiscordInitializationInput:
      type: object
      required: [mode]
      properties:
        mode: { type: string, enum: [incremental, fresh] }
        confirmation: { type: string }
    DiscordConflict:
      type: object
      required: [name, reason]
      properties:
        name: { type: string }
        reason: { type: string }
    DiscordPreflight:
      type: object
      required: [guildId, mode, creates, updates, deletes, conflicts, missingPermissions, channelCount, safe]
      properties:
        guildId: { type: string }
        mode: { type: string, enum: [incremental, fresh] }
        creates: { type: array, items: { type: string } }
        updates: { type: array, items: { type: string } }
        deletes: { type: array, items: { type: string } }
        conflicts: { type: array, items: { $ref: "#/components/schemas/DiscordConflict" } }
        missingPermissions: { type: array, items: { type: string } }
        channelCount: { type: integer }
        safe: { type: boolean }
    DiscordInitialization:
      type: object
      required: [id, guildId, mode, status, preflight, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        guildId: { type: string }
        mode: { type: string }
        status: { type: string }
        preflight: { $ref: "#/components/schemas/DiscordPreflight" }
        error: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    DiscordMember:
      type: object
      required: [guildId, discordUserId, username, displayName, bound]
      properties:
        guildId: { type: string }
        discordUserId: { type: string }
        username: { type: string }
        displayName: { type: string }
        bound: { type: boolean }
        githubLogin: { type: string }
    DiscordDevelopmentForum:
      type: object
      required: [id, name, discordId, repositoryId, repository, status, branch, dirty]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        discordId: { type: string }
        repositoryId: { type: string, format: uuid }
        repository: { type: string }
        status: { type: string }
        branch: { type: string }
        dirty: { type: boolean }
        error: { type: string }
    DiscordDevelopmentEnvironment:
      type: object
      required: [id, ownerDiscordUserId, ownerName, buildRepositoryId, buildRepository, status, lastUsedAt, forums]
      properties:
        id: { type: string, format: uuid }
        ownerDiscordUserId: { type: string }
        ownerName: { type: string }
        buildRepositoryId: { type: string, format: uuid }
        buildRepository: { type: string }
        status: { type: string }
        imageId: { type: string }
        buildSourceSha: { type: string }
        runtimeUser: { type: string }
        lastUsedAt: { type: string, format: date-time }
        error: { type: string }
        forums: { type: array, items: { $ref: "#/components/schemas/DiscordDevelopmentForum" } }
    DiscordDevelopmentDeletePreflight:
      type: object
      required: [forumId, dirty, unpushed, active, deletesEnvironment, confirmation]
      properties:
        forumId: { type: string, format: uuid }
        dirty: { type: boolean }
        unpushed: { type: boolean }
        active: { type: boolean }
        deletesEnvironment: { type: boolean }
        confirmation: { type: string }
    IDResource:
      type: object
      required: [id]
      properties:
        id: { type: string, format: uuid }
    ResourceList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { type: object, additionalProperties: true }
        nextCursor: { type: string }
security:
  - sessionCookie: []
