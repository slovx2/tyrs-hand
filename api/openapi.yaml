openapi: 3.1.0
info:
  title: tyrs-hand Management API
  version: 0.1.0
  license:
    name: MIT
    identifier: MIT
servers:
  - url: /api/v1
tags:
  - name: Auth
  - name: GitHub
  - name: Resources
  - name: Settings
  - name: Discord
  - name: Execution Nodes
  - name: SSH
  - name: Worker Protocol
paths:
  /webhooks/github:
    post:
      operationId: receiveGitHubWebhook
      tags: [GitHub]
      servers: [{ url: / }]
      security: []
      parameters:
        - { name: X-Hub-Signature-256, in: header, required: true, schema: { type: string } }
        - { name: X-GitHub-Delivery, in: header, required: true, schema: { type: string } }
        - { name: X-GitHub-Event, in: header, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "202":
          description: 已持久化
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        default: { $ref: "#/components/responses/Problem" }
  /internal/v1/tools/call:
    post:
      operationId: callInternalTool
      tags: [Resources]
      servers: [{ url: / }]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Tool Call 结果
          content:
            application/json:
              schema: { type: object, additionalProperties: true }
        default: { $ref: "#/components/responses/Problem" }
  /setup/status:
    get:
      operationId: getSetupStatus
      tags: [Auth]
      security: []
      responses:
        "200":
          description: Setup 状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupStatus" }
  /setup/admin:
    post:
      operationId: setupAdministrator
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetupRequest" }
      responses:
        "201":
          description: 管理员与恢复资料
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SetupResult" }
        default: { $ref: "#/components/responses/Problem" }
  /auth/login:
    post:
      operationId: login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200":
          description: 登录会话
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResult" }
        default: { $ref: "#/components/responses/Problem" }
  /auth/me:
    get:
      operationId: getCurrentAdministrator
      tags: [Auth]
      responses:
        "200":
          description: 当前管理员
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Administrator" }
        default: { $ref: "#/components/responses/Problem" }
  /auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: 已退出 }
        default: { $ref: "#/components/responses/Problem" }
  /github/app:
    get:
      operationId: getGitHubApp
      tags: [GitHub]
      responses:
        "200":
          description: GitHub App 状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/GitHubAppStatus" }
    put:
      operationId: putGitHubApp
      tags: [GitHub]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/GitHubAppInput" }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /github/app/manifest:
    get:
      operationId: getGitHubAppManifest
      tags: [GitHub]
      responses:
        "200":
          description: Manifest 表单参数
          content:
            application/json:
              schema:
                type: object
                required: [url, manifest]
                properties:
                  url: { type: string, format: uri }
                  manifest: { type: string }
  /github/app/manifest/callback:
    get:
      operationId: githubAppManifestCallback
      tags: [GitHub]
      parameters:
        - name: code
          in: query
          required: true
          schema: { type: string }
      responses:
        "302": { description: 返回 GitHub 设置页 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/agent-provider:
    get:
      operationId: getAgentProviderSettings
      tags: [Settings]
      responses:
        "200":
          description: Agent Provider 设置
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AgentProviderSettings" }
    put:
      operationId: putAgentProviderSettings
      tags: [Settings]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AgentProviderSettingsInput" }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/agent-provider/chatgpt/login:
    post:
      operationId: startChatGPTLogin
      tags: [Settings]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "202":
          description: 已发起 ChatGPT Device Code 登录
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatGPTLoginOperation" }
        default: { $ref: "#/components/responses/Problem" }
  /settings/agent-provider/chatgpt/login/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: string, format: uuid }
    get:
      operationId: getChatGPTLogin
      tags: [Settings]
      responses:
        "200":
          description: ChatGPT Device Code 登录状态
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ChatGPTLoginOperation" }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      operationId: cancelChatGPTLogin
      tags: [Settings]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: 已取消登录 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/agent-provider/chatgpt/account:
    delete:
      operationId: logoutChatGPT
      tags: [Settings]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: 已退出全局 ChatGPT 账号 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/global-agents:
    get:
      operationId: getGlobalAgents
      tags: [Settings]
      responses:
        "200":
          description: 注入所有 Codex Home 的全局 AGENTS.md
          content: { application/json: { schema: { $ref: "#/components/schemas/GlobalAgents" } } }
        default: { $ref: "#/components/responses/Problem" }
    put:
      operationId: putGlobalAgents
      tags: [Settings]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/GlobalAgents" } } }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/codex:
    get:
      operationId: listCodexSettings
      tags: [Settings]
      responses:
        "200":
          description: 仓库与 Discord Forum 的 Codex 设置
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CodexSettingsList" }
        default: { $ref: "#/components/responses/Problem" }
  /settings/codex/repositories/{id}:
    put:
      operationId: putRepositoryCodexSettings
      tags: [Settings]
      parameters:
        - { $ref: "#/components/parameters/CSRFToken" }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CodexPreferences" } } }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/codex/forums/{id}:
    put:
      operationId: putForumCodexSettings
      tags: [Settings]
      parameters:
        - { $ref: "#/components/parameters/CSRFToken" }
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CodexPreferences" } } }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /settings/discord:
    get:
      operationId: getDiscordSettings
      tags: [Discord]
      responses:
        "200":
          description: Discord 设置
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordSettings" } } }
        default: { $ref: "#/components/responses/Problem" }
    put:
      operationId: putDiscordSettings
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DiscordSettingsInput" } } }
      responses:
        "204": { description: 已保存 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/status:
    get:
      operationId: getDiscordStatus
      tags: [Discord]
      responses:
        "200":
          description: Discord 运行状态
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordStatus" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/initializations/preflight:
    post:
      operationId: preflightDiscordInitialization
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DiscordInitializationInput" } } }
      responses:
        "200":
          description: 零修改预检结果
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordPreflight" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/initializations:
    post:
      operationId: createDiscordInitialization
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DiscordInitializationInput" } } }
      responses:
        "202":
          description: 初始化已排队
          content: { application/json: { schema: { $ref: "#/components/schemas/IDResource" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/initializations/{id}:
    get:
      operationId: getDiscordInitialization
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        "200":
          description: 初始化状态
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordInitialization" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/members:
    get:
      operationId: listDiscordMembers
      tags: [Discord]
      responses:
        "200":
          description: Discord 成员
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DiscordMember" } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-environments:
    get:
      operationId: listDiscordDevelopmentEnvironments
      tags: [Discord]
      responses:
        "200":
          description: 长期开发环境
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/DiscordDevelopmentEnvironment" } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-environments/{id}/rebuild:
    post:
      operationId: rebuildDiscordDevelopmentEnvironment
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      responses:
        "202": { description: 已标记为下次运行前重建 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-environments/{id}/ssh:
    put:
      operationId: putDiscordDevelopmentEnvironmentSSH
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/DiscordDevelopmentEnvironmentSSHInput" } } }
      responses:
        "202": { description: SSH 配置已排队 }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      operationId: deleteDiscordDevelopmentEnvironmentSSH
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      responses:
        "202": { description: SSH 停用已排队 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-forums/{id}/delete-preflight:
    get:
      operationId: preflightDiscordDevelopmentForumDeletion
      tags: [Discord]
      parameters: [{ name: id, in: path, required: true, schema: { type: string, format: uuid } }]
      responses:
        "200":
          description: 删除预检
          content: { application/json: { schema: { $ref: "#/components/schemas/DiscordDevelopmentDeletePreflight" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/development-forums/{id}/delete:
    post:
      operationId: deleteDiscordDevelopmentForum
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [confirmation]
              properties: { confirmation: { type: string } }
      responses:
        "202":
          description: 删除已排队
          content: { application/json: { schema: { $ref: "#/components/schemas/IDResource" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/members/{id}/forum:
    post:
      operationId: createDiscordMemberForum
      tags: [Discord]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [repositoryId]
              properties:
                repositoryId: { type: string, format: uuid }
                name: { type: string }
      responses:
        "202":
          description: Forum 创建已排队
          content: { application/json: { schema: { $ref: "#/components/schemas/IDResource" } } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/forums/{forumId}/access/{memberId}:
    parameters:
      - { name: forumId, in: path, required: true, schema: { type: string, format: uuid } }
      - { name: memberId, in: path, required: true, schema: { type: string } }
    put:
      operationId: putDiscordForumAccess
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accessLevel]
              properties: { accessLevel: { type: string, enum: [readonly, operator] } }
      responses:
        "204": { description: 已更新 }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      operationId: deleteDiscordForumAccess
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      responses:
        "204": { description: 已删除 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/github/bind:
    post:
      operationId: startDiscordGitHubBind
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guildId, discordUserId]
              properties: { guildId: { type: string }, discordUserId: { type: string } }
      responses:
        "200":
          description: 一次性绑定链接
          content:
            application/json:
              schema:
                type: object
                required: [url]
                properties: { url: { type: string, format: uri } }
        default: { $ref: "#/components/responses/Problem" }
  /discord/github/bind/callback:
    get:
      operationId: completeDiscordGitHubBind
      tags: [Discord]
      security: []
      parameters:
        - { name: state, in: query, required: true, schema: { type: string } }
        - { name: code, in: query, required: true, schema: { type: string } }
      responses:
        "200": { description: 绑定完成 }
        default: { $ref: "#/components/responses/Problem" }
  /discord/github/unbind:
    post:
      operationId: unbindDiscordGitHub
      tags: [Discord]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [guildId, discordUserId, confirmed]
              properties:
                guildId: { type: string }
                discordUserId: { type: string }
                confirmed: { type: boolean }
      responses:
        "204": { description: 已解绑 }
        default: { $ref: "#/components/responses/Problem" }
  /events/stream:
    get:
      operationId: streamEvents
      tags: [Resources]
      responses:
        "200":
          description: Server-Sent Events
          content:
            text/event-stream:
              schema: { type: string }
  /repositories:
    get: { $ref: "#/components/pathItems/ListRepositories" }
    post:
      operationId: createRepository
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RepositoryInput" }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDResource" }
        default: { $ref: "#/components/responses/Problem" }
  /agent-profiles:
    get: { $ref: "#/components/pathItems/ListAgentProfiles" }
    post: { $ref: "#/components/pathItems/CreateGeneric" }
  /trigger-rules:
    get: { $ref: "#/components/pathItems/ListTriggerRules" }
    post:
      operationId: createTriggerRule
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/TriggerRuleInput" }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDResource" }
        default: { $ref: "#/components/responses/Problem" }
  /work-items:
    get: { $ref: "#/components/pathItems/ListWorkItems" }
  /threads:
    get: { $ref: "#/components/pathItems/ListThreads" }
  /jobs:
    get: { $ref: "#/components/pathItems/ListJobs" }
  /workers:
    get: { $ref: "#/components/pathItems/ListWorkers" }
  /execution-nodes:
    get:
      operationId: listExecutionNodes
      tags: [Execution Nodes]
      responses:
        "200":
          description: 执行节点列表
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties: { items: { type: array, items: { $ref: "#/components/schemas/ExecutionNode" } } }
    post:
      operationId: createExecutionNode
      tags: [Execution Nodes]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ExecutionNodeInput" } } }
      responses:
        "201":
          description: 节点与一次性注册 Token
          content: { application/json: { schema: { $ref: "#/components/schemas/ExecutionNodeCreated" } } }
  /execution-nodes/{id}/enrollments:
    post:
      operationId: createExecutionNodeEnrollment
      tags: [Execution Nodes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      responses:
        "201": { description: 一次性注册 Token, content: { application/json: { schema: { $ref: "#/components/schemas/EnrollmentToken" } } } }
  /execution-nodes/{id}:
    delete:
      operationId: deleteExecutionNode
      tags: [Execution Nodes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      responses: { "204": { description: 已删除 }, default: { $ref: "#/components/responses/Problem" } }
  /execution-nodes/{id}/enabled:
    put:
      operationId: setExecutionNodeEnabled
      tags: [Execution Nodes]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [enabled], properties: { enabled: { type: boolean } } } } } }
      responses: { "204": { description: 已更新 }, default: { $ref: "#/components/responses/Problem" } }
  /settings/execution:
    get:
      operationId: getExecutionDefaults
      tags: [Execution Nodes]
      responses: { "200": { description: 默认节点, content: { application/json: { schema: { $ref: "#/components/schemas/ExecutionDefaults" } } } } }
    put:
      operationId: putExecutionDefaults
      tags: [Execution Nodes]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ExecutionDefaults" } } } }
      responses: { "204": { description: 已保存 }, default: { $ref: "#/components/responses/Problem" } }
  /ssh/credentials:
    get:
      operationId: listSSHCredentials
      tags: [SSH]
      responses:
        "200":
          description: SSH 凭证列表，不包含私钥或口令
          content: { application/json: { schema: { $ref: "#/components/schemas/SSHCredentialList" } } }
        default: { $ref: "#/components/responses/Problem" }
    post:
      operationId: createSSHCredential
      tags: [SSH]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SSHCredentialCreateInput" } } }
      responses:
        "201":
          description: 已创建的脱敏 SSH 凭证
          content: { application/json: { schema: { $ref: "#/components/schemas/SSHCredential" } } }
        default: { $ref: "#/components/responses/Problem" }
  /ssh/credentials/{id}:
    put:
      operationId: updateSSHCredential
      tags: [SSH]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/CSRFToken" }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/SSHCredentialUpdateInput" } } }
      responses:
        "200":
          description: 已更新的脱敏 SSH 凭证
          content: { application/json: { schema: { $ref: "#/components/schemas/SSHCredential" } } }
        default: { $ref: "#/components/responses/Problem" }
    delete:
      operationId: deleteSSHCredential
      tags: [SSH]
      parameters:
