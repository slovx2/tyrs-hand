  /worker/v1/development-operations/{id}/complete:
    post:
      operationId: completeWorkerDevelopmentOperation
      tags: [Worker Protocol]
      servers: [{ url: / }]
      security: [{ nodeBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkerResourceID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/WorkerOperationTerminal" } } } }
      responses: { "204": { description: Operation 已完成 }, default: { $ref: "#/components/responses/Problem" } }
  /worker/v1/development-operations/{id}/fail:
    post:
      operationId: failWorkerDevelopmentOperation
      tags: [Worker Protocol]
      servers: [{ url: / }]
      security: [{ nodeBearer: [] }]
      parameters: [{ $ref: "#/components/parameters/WorkerResourceID" }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/WorkerOperationTerminal" } } } }
      responses: { "204": { description: Operation 已失败 }, default: { $ref: "#/components/responses/Problem" } }
  /worktrees:
    get: { $ref: "#/components/pathItems/ListWorktrees" }
  /audit-logs:
    get: { $ref: "#/components/pathItems/ListAuditLogs" }
  /installations:
    get: { $ref: "#/components/pathItems/ListInstallations" }
  /repo-caches:
    get: { $ref: "#/components/pathItems/ListRepoCaches" }
  /system/status:
    get:
      operationId: getSystemStatus
      tags: [Resources]
      responses:
        "200":
          description: 系统状态
          content:
            application/json:
              schema: { type: object, additionalProperties: { type: integer, format: int64 } }
        default: { $ref: "#/components/responses/Problem" }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: tyrs_hand_session
    nodeBearer:
      type: http
      scheme: bearer
      bearerFormat: opaque-node-token
  parameters:
    CSRFToken:
      name: X-CSRF-Token
      in: header
      required: true
      schema: { type: string }
    Cursor:
      name: cursor
      in: query
      required: false
      schema: { type: string }
    Limit:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    WorkerResourceID:
      name: id
      in: path
      required: true
      schema: { type: string, format: uuid }
  responses:
    Problem:
      description: RFC 9457 Problem Details
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    ResourceList:
      description: 游标分页资源列表
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ResourceList" }
  pathItems:
    ListRepositories:
      operationId: listRepositories
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListAgentProfiles:
      operationId: listAgentProfiles
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListTriggerRules:
      operationId: listTriggerRules
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListWorkItems:
      operationId: listWorkItems
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListThreads:
      operationId: listThreads
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListJobs:
      operationId: listJobs
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListWorkers:
      operationId: listWorkers
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListWorktrees:
      operationId: listWorktrees
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListAuditLogs:
      operationId: listAuditLogs
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListInstallations:
      operationId: listInstallations
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    ListRepoCaches:
      operationId: listRepoCaches
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/Cursor" }, { $ref: "#/components/parameters/Limit" }]
      responses: { "200": { $ref: "#/components/responses/ResourceList" }, default: { $ref: "#/components/responses/Problem" } }
    CreateGeneric:
      tags: [Resources]
      parameters: [{ $ref: "#/components/parameters/CSRFToken" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object, additionalProperties: true }
      responses:
        "201":
          description: 已创建
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IDResource" }
        default: { $ref: "#/components/responses/Problem" }
  schemas:
    ExecutionNode:
      type: object
      required: [id, name, roles, enabled, maxConcurrentJobs, protocolVersion, status, metadata]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        roles: { type: array, items: { type: string, enum: [github, discord] } }
        enabled: { type: boolean }
        maxConcurrentJobs: { type: integer, minimum: 1 }
        protocolVersion: { type: integer }
        workerVersion: { type: string }
        status: { type: string, enum: [pending, online, offline, disabled, incompatible, error] }
        heartbeatAt: { type: string, format: date-time }
        lastError: { type: string }
        metadata: { type: object, additionalProperties: true }
    ExecutionNodeInput:
      type: object
      required: [name, roles, maxConcurrentJobs]
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        roles: { type: array, minItems: 1, items: { type: string, enum: [github, discord] } }
        maxConcurrentJobs: { type: integer, minimum: 1 }
    EnrollmentToken:
      type: object
      required: [enrollmentToken, expiresIn]
      properties:
        enrollmentToken: { type: string, writeOnly: true }
        expiresIn: { type: integer, enum: [900] }
    ExecutionNodeCreated:
      allOf:
        - { $ref: "#/components/schemas/EnrollmentToken" }
        - type: object
          required: [node]
          properties: { node: { $ref: "#/components/schemas/ExecutionNode" } }
    ExecutionDefaults:
      type: object
      properties:
        githubNodeId: { type: string, format: uuid, nullable: true }
        discordNodeId: { type: string, format: uuid, nullable: true }
    SSHCredential:
      type: object
      required: [id, name, publicKey, fingerprint, enabled, version, hostCount, updatedAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        publicKey: { type: string, readOnly: true }
        fingerprint: { type: string, readOnly: true }
        enabled: { type: boolean }
        version: { type: integer, format: int64, readOnly: true }
        hostCount: { type: integer, readOnly: true }
        updatedAt: { type: string, format: date-time, readOnly: true }
    SSHCredentialList:
      type: object
      required: [items]
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/SSHCredential" } }
    SSHCredentialCreateInput:
      type: object
      required: [name, privateKey, enabled]
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        privateKey: { type: string, minLength: 1, writeOnly: true }
        passphrase: { type: string, writeOnly: true }
        enabled: { type: boolean }
    SSHCredentialUpdateInput:
      type: object
      required: [name, enabled]
      properties:
        name: { type: string, minLength: 1, maxLength: 128 }
        privateKey:
          type: string
          writeOnly: true
          description: 非空时显式轮换私钥；空字符串表示保持现有私钥
        passphrase: { type: string, writeOnly: true }
        enabled: { type: boolean }
    SSHHost:
      type: object
      required: [id, alias, hostname, port, username, credentialId, credentialName, executionNodeIds, enabled, updatedAt]
      properties:
        id: { type: string, format: uuid }
        alias: { type: string }
        hostname: { type: string }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username: { type: string }
        credentialId: { type: string, format: uuid }
        credentialName: { type: string, readOnly: true }
        proxyJumpHostId: { type: string, format: uuid }
        proxyJumpAlias: { type: string, readOnly: true }
        executionNodeIds: { type: array, items: { type: string, format: uuid } }
        enabled: { type: boolean }
        updatedAt: { type: string, format: date-time, readOnly: true }
    SSHHostInput:
      type: object
      required: [alias, hostname, port, username, credentialId, executionNodeIds, enabled]
      properties:
        alias: { type: string, minLength: 1, maxLength: 128, pattern: "^[A-Za-z0-9._-]+$" }
        hostname: { type: string, minLength: 1, maxLength: 255 }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username: { type: string, minLength: 1, maxLength: 128 }
        credentialId: { type: string, format: uuid }
        proxyJumpHostId: { type: string, format: uuid }
        executionNodeIds: { type: array, items: { type: string, format: uuid }, uniqueItems: true }
        enabled: { type: boolean }
    SSHHostImportItem:
      type: object
      required: [alias, hostname, port, username]
      properties:
        alias: { type: string, minLength: 1, maxLength: 128, pattern: "^[A-Za-z0-9._-]+$" }
        hostname: { type: string, minLength: 1, maxLength: 255 }
        port: { type: integer, minimum: 1, maximum: 65535 }
        username: { type: string, minLength: 1, maxLength: 128 }
        proxyJumpAlias: { type: string, minLength: 1, maxLength: 128, pattern: "^[A-Za-z0-9._-]+$" }
    SSHHostImportInput:
      type: object
      required: [credentialId, executionNodeIds, enabled, hosts]
      properties:
        credentialId: { type: string, format: uuid }
        executionNodeIds: { type: array, items: { type: string, format: uuid }, uniqueItems: true }
        enabled: { type: boolean }
        hosts:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: "#/components/schemas/SSHHostImportItem" }
    SSHHostList:
      type: object
      required: [items]
      properties:
