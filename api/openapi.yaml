      responses: { "200": { description: Git 凭据, content: { application/json: { schema: { type: object, additionalProperties: true } } } }, default: { $ref: "#/components/responses/Problem" } }
  /worker/v1/runs/{id}/attachments/{attachmentId}:
    get:
      operationId: downloadWorkerAttachment
      tags: [Worker Protocol]
      servers: [{ url: / }]
      security: [{ nodeBearer: [] }]
      parameters:
        - { $ref: "#/components/parameters/WorkerResourceID" }
        - { name: attachmentId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: X-Run-Lease-Token, in: header, required: true, schema: { type: string } }
        - { name: X-Run-Lease-Epoch, in: header, required: true, schema: { type: integer, format: int64 } }
      responses: { "200": { description: Discord 附件, content: { application/octet-stream: { schema: { type: string, format: binary } } } }, default: { $ref: "#/components/responses/Problem" } }
  /worker/v1/development-operations/{id}/heartbeat:
    post:
      operationId: heartbeatWorkerDevelopmentOperation
