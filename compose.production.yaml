services:
  server:
    image: ${TYRS_HAND_CONTROL_IMAGE:?请设置 Control 镜像 digest}
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    secrets: [master_key]

  discord:
    image: ${TYRS_HAND_CONTROL_IMAGE:?请设置 Control 镜像 digest}
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    secrets: [master_key]

  admin:
    image: ${TYRS_HAND_CONTROL_IMAGE:?请设置 Control 镜像 digest}
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    secrets: [master_key]

secrets:
  master_key:
    file: ./.local/secrets/master_key
