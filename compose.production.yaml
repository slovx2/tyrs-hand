services:
  server:
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    secrets: [master_key]

  worker:
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    secrets: [master_key]

  discord-worker:
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    group_add:
      - ${TYRS_HAND_DOCKER_GID:?请设置宿主 Docker Socket 的数字 GID}
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    secrets: [master_key]

  discord:
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    secrets: [master_key]

  admin:
    environment:
      TYRS_HAND_MASTER_KEY: ""
      TYRS_HAND_MASTER_KEY_FILE: /run/secrets/master_key
    secrets: [master_key]

secrets:
  master_key:
    file: ./.local/secrets/master_key
