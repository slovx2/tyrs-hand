# Beta。有安全风险，请确保所有用户可信再开启。
# 启用后，非 root Worker 仍可通过 Docker Socket 完整控制宿主 Docker Daemon。
services:
  worker:
    environment:
      TYRS_HAND_ENABLE_HOST_DOCKER: "true"
      TYRS_HAND_DOCKER_NETWORK: ${TYRS_HAND_DOCKER_NETWORK:-tyrs-hand-agent-runtime}
      TYRS_HAND_DOCKER_STOP_TIMEOUT: ${TYRS_HAND_DOCKER_STOP_TIMEOUT:-10s}
      TYRS_HAND_DOCKER_CLEANUP_TIMEOUT: ${TYRS_HAND_DOCKER_CLEANUP_TIMEOUT:-30s}
      TYRS_HAND_DOCKER_SWEEP_INTERVAL: ${TYRS_HAND_DOCKER_SWEEP_INTERVAL:-30s}
    group_add:
      - ${TYRS_HAND_DOCKER_GID:?请设置宿主 Docker Socket 的数字 GID}
    volumes:
      - type: bind
        source: /var/run/docker.sock
        target: /var/run/docker.sock
    networks:
      default: {}
      agent-runtime: {}

networks:
  agent-runtime:
    name: ${TYRS_HAND_DOCKER_NETWORK:-tyrs-hand-agent-runtime}
